<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thornbush</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230d0d0d'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='38' font-weight='400' text-anchor='middle' fill='%23e8e4dc'%3ET%3C/text%3E%3Cline x1='32' y1='56' x2='32' y2='18' stroke='%23e8e4dc' stroke-width='1'/%3E%3Cline x1='32' y1='36' x2='24' y2='28' stroke='%23e8e4dc' stroke-width='1'/%3E%3Cline x1='32' y1='44' x2='40' y2='37' stroke='%23e8e4dc' stroke-width='1'/%3E%3Ccircle cx='24' cy='28' r='1.5' fill='%23e8e4dc'/%3E%3Ccircle cx='40' cy='37' r='1.5' fill='%23e8e4dc'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0d0d0d;
      --ink: #e8e4dc;
      --muted: #555250;
      --thorn: #e8e4dc;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: 'Bebas Neue', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      overflow: hidden;
    }

    /* Subtle grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .wordmark {
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--thorn);
      line-height: 1;
    }

    .wordmark span {
      display: inline-block;
      opacity: 0;
      transform: translateY(12px);
      animation: letterIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Stagger each letter */
    .wordmark span:nth-child(1)  { animation-delay: 0.05s; }
    .wordmark span:nth-child(2)  { animation-delay: 0.10s; }
    .wordmark span:nth-child(3)  { animation-delay: 0.15s; }
    .wordmark span:nth-child(4)  { animation-delay: 0.20s; }
    .wordmark span:nth-child(5)  { animation-delay: 0.25s; }
    .wordmark span:nth-child(6)  { animation-delay: 0.30s; }
    .wordmark span:nth-child(7)  { animation-delay: 0.35s; }
    .wordmark span:nth-child(8)  { animation-delay: 0.40s; }
    .wordmark span:nth-child(9)  { animation-delay: 0.45s; }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--muted);
      margin: 2rem auto;
      opacity: 0;
      animation: fadeIn 1s 0.8s ease forwards;
    }

    .tagline {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: clamp(0.65rem, 2vw, 0.78rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 1s 1s ease forwards;
    }

    /* Thorn illustration */
    .thorn-svg {
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeIn 1.2s 0.2s ease forwards;
    }

    @keyframes letterIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Menu */
    .menu {
      position: fixed;
      top: 2rem;
      left: 2rem;
      z-index: 10;
      font-family: 'DM Mono', monospace;
    }

    .menu-toggle {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 4px;
      opacity: 0;
      animation: fadeIn 1s 1.2s ease forwards;
    }

    .menu-toggle span {
      display: block;
      width: 22px;
      height: 1px;
      background: var(--ink);
      transition: all 0.3s ease;
      transform-origin: center;
    }

    .menu-toggle.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .menu-toggle.open span:nth-child(2) { opacity: 0; }
    .menu-toggle.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    .menu-dropdown {
      margin-top: 1.2rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .menu-dropdown.open {
      max-height: 300px;
    }

    .menu-dropdown a {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 0.5rem 0;
      border-bottom: 1px solid #1e1e1e;
      opacity: 0;
      transform: translateX(-8px);
      transition: color 0.2s ease, opacity 0.3s ease, transform 0.3s ease;
    }

    .menu-dropdown.open a {
      opacity: 1;
      transform: translateX(0);
    }

    .menu-dropdown.open a:nth-child(1) { transition-delay: 0.05s; }
    .menu-dropdown.open a:nth-child(2) { transition-delay: 0.10s; }
    .menu-dropdown.open a:nth-child(3) { transition-delay: 0.15s; }
    .menu-dropdown.open a:nth-child(4) { transition-delay: 0.20s; }

    .menu-dropdown a:hover { color: var(--ink); }
  </style>
</head>
<body>
<nav class="menu">
    <button class="menu-toggle" id="toggle" aria-label="Menu openen">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="menu-dropdown" id="dropdown">
      <a href="#">Over mij</a>
      <a href="#">Projecten</a>
      <a href="#">Blog / Artikelen</a>
      <a href="https://linkedin.com" target="_blank" rel="noopener">LinkedIn</a>
    </div>
  </nav>

  <div class="container">

    <!-- Minimal thorn illustration -->
    <div class="thorn-svg">
      <svg width="48" height="72" viewBox="0 0 48 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="24" y1="72" x2="24" y2="0" stroke="#e8e4dc" stroke-width="0.8"/>
        <line x1="24" y1="28" x2="10" y2="14" stroke="#e8e4dc" stroke-width="0.8"/>
        <line x1="24" y1="42" x2="38" y2="30" stroke="#e8e4dc" stroke-width="0.8"/>
        <line x1="24" y1="54" x2="12" y2="44" stroke="#e8e4dc" stroke-width="0.8"/>
        <circle cx="10" cy="14" r="1.5" fill="#e8e4dc"/>
        <circle cx="38" cy="30" r="1.5" fill="#e8e4dc"/>
        <circle cx="12" cy="44" r="1.5" fill="#e8e4dc"/>
      </svg>
    </div>

    <div class="wordmark" aria-label="Thornbush">
      <span>T</span><span>H</span><span>O</span><span>R</span><span>N</span><span>B</span><span>U</span><span>S</span><span>H</span>
    </div>

    <div class="divider"></div>

    <p class="tagline">Personal reflections on the digital transformation of the public sector</p>

  </div>
  <script>
    const toggle = document.getElementById('toggle');
    const dropdown = document.getElementById('dropdown');
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      dropdown.classList.toggle('open');
    });
  </script>
</body>
</html>
